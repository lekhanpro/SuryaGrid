services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: suryagrid
      POSTGRES_PASSWORD: suryagrid
      POSTGRES_DB: suryagrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suryagrid -d suryagrid"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=50

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://suryagrid:suryagrid@postgres:5432/suryagrid
      REDIS_URL: redis://redis:6379/0
      WEATHER_PROVIDER: ${WEATHER_PROVIDER:-open-meteo}
      WEATHER_API_BASE_URL: ${WEATHER_API_BASE_URL:-https://api.open-meteo.com/v1/forecast}
      DSM_DEFAULT_REGION: ${DSM_DEFAULT_REGION:-Karnataka}
      DSM_DEFAULT_RULE_PROFILE: ${DSM_DEFAULT_RULE_PROFILE:-kerc-solar}
      CORS_ORIGINS: '["http://suryagrid.mithungowda.in","http://suryagrid.mithungowda.in:3000","http://32.197.42.115:3000","http://localhost:3000"]'
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://32.197.42.115:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
