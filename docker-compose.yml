version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: suryagrid
      POSTGRES_PASSWORD: suryagrid
      POSTGRES_DB: suryagrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env.example
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
