# ============================================================================
# CD — Deploy SuryaGrid to AWS
# Backend: Build → Push to ECR → Deploy to ECS Fargate
# Frontend: Build static → Sync to S3 → Invalidate CloudFront cache
# ============================================================================

name: Deploy to AWS

on:
  # Auto-deploy when CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "Deploy backend"
        type: boolean
        default: true
      deploy_frontend:
        description: "Deploy frontend"
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel an in-progress deploy

# Only run if CI succeeded (workflow_run trigger) or manual dispatch
jobs:
  # ---------- Pre-check ----------
  gate:
    name: Deployment gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      deploy_backend: ${{ steps.decide.outputs.backend }}
      deploy_frontend: ${{ steps.decide.outputs.frontend }}
    steps:
      - id: decide
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "backend=${{ inputs.deploy_backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ inputs.deploy_frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------- Backend: Build & Push to ECR, then deploy to ECS ----------
  deploy-backend:
    name: Deploy backend (ECS Fargate)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.deploy_backend == 'true'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'suryagrid-backend' }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        env:
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'suryagrid-backend' }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE || 'suryagrid-backend' }}
          cluster: ${{ vars.ECS_CLUSTER || 'suryagrid-cluster' }}
          wait-for-service-stability: true

      - name: Verify deployment health
        env:
          ALB_URL: ${{ vars.ALB_URL }}
        run: |
          if [ -n "$ALB_URL" ]; then
            echo "Checking backend health at $ALB_URL/api/v1/health ..."
            for i in {1..5}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ALB_URL/api/v1/health" || true)
              if [ "$STATUS" = "200" ]; then
                echo "✓ Backend healthy (HTTP 200)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
              sleep 10
            done
            echo "::warning::Health check did not return 200 after 5 attempts"
          else
            echo "::notice::ALB_URL not set — skipping health verification"
          fi

  # ---------- Frontend: Build static & deploy to S3 + CloudFront ----------
  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.deploy_frontend == 'true'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.BACKEND_API_URL || '' }}
          STATIC_EXPORT: "true"
        run: npm run build

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET || 'suryagrid-frontend' }}
        run: |
          aws s3 sync frontend/out/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html" \
            --exclude "_next/data/*"
          # HTML files — short cache for fresh content
          aws s3 sync frontend/out/ s3://$S3_BUCKET/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=60, s-maxage=300"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "✓ CloudFront cache invalidation initiated"
          else
            echo "::notice::CLOUDFRONT_DISTRIBUTION_ID not set — skipping invalidation"
          fi
