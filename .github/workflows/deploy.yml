name: Deploy to GitHub Pages

# CD runs only after the CI workflow succeeds on main, or on a manual trigger.
# This guarantees deployment never happens on a red build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress production runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    # Skip when the triggering CI run failed (manual dispatch always proceeds).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages (detect base path, no hosting assumptions)
        id: pages
        # Does not fail the run if Pages is not yet enabled; we validate next
        # and emit a clear, actionable error instead.
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Validate Pages prerequisite
        if: steps.pages.outcome != 'success'
        run: |
          echo "::error title=GitHub Pages not enabled::Enable Pages with 'GitHub Actions' as the source in Settings → Pages, then re-run this workflow."
          exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (base path taken from the actual Pages configuration)
        env:
          # Empty for custom-domain/user sites, "/<repo>" for project sites.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Validate build artifact
        run: |
          if [ ! -f out/index.html ]; then
            echo "::error title=Build artifact missing::Static export did not produce out/index.html."
            exit 1
          fi
          echo "Static export OK ($(find out -type f | wc -l) files)."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: Deploy & verify
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deployment verification
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "Verifying deployment at $url"
          code=$(curl -sSL -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 5 --retry-all-errors "$url" || echo 000)
          if [ "$code" != "200" ]; then
            echo "::error title=Deployment verification failed::$url returned HTTP $code (expected 200)."
            exit 1
          fi
          echo "Deployment verified: HTTP 200 at $url"
