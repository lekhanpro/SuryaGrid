[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["app/db/migrations/versions"]

[tool.ruff.lint]
# pycodestyle (E), pyflakes (F), isort (I), pyupgrade (UP), flake8-bugbear (B)
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # line length handled by the formatter, not enforced hard

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # tests insert sys.path / env before imports

[tool.ruff.lint.flake8-bugbear]
# FastAPI dependency-injection idioms are safe in argument defaults.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]
